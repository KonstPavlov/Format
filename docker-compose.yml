services:
  mongo:
    image: mongo:7
    container_name: format_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Uncomment to expose Mongo on the host (usually not needed)
    # ports:
    #   - "27017:27017"

  backend:
    build: ./backend
    container_name: format_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override MONGO_URL so it points to the mongo service inside the network
      MONGO_URL: "mongodb://mongo:27017"
    depends_on:
      - mongo
    expose:
      - "8001"

  frontend:
    build:
      context: ./frontend
      args:
        # Public URL where users access the site (used for API calls).
        # Set this to your real domain, e.g. https://format-irk.ru
        REACT_APP_BACKEND_URL: "${PUBLIC_URL:-http://localhost}"
    container_name: format_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      # For HTTPS, terminate TLS here or put a reverse proxy / Caddy / Traefik in front
      # - "443:443"

volumes:
  mongo_data:
