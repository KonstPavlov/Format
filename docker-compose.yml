services:
  backend:
    build: ./backend
    container_name: format_backend
    restart: unless-stopped
    # Работает сразу после `docker compose up -d --build` — почта уже настроена.
    # Значения можно переопределить переменными окружения или корневым .env.
    environment:
      CORS_ORIGINS: "*"
      RECIPIENT_EMAIL: "${RECIPIENT_EMAIL:-lax-jakal@yandex.ru}"
      SMTP_HOST: "${SMTP_HOST:-smtp.yandex.ru}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_USER: "${SMTP_USER:-lax-jakal@yandex.ru}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-itoizynivptmtmfl}"
    expose:
      - "8001"

  frontend:
    build:
      context: ./frontend
      args:
        # Пусто → фронтенд использует относительный "/api" (nginx проксирует на backend).
        REACT_APP_BACKEND_URL: "${PUBLIC_URL:-}"
    container_name: format_frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Доступен только внутри Docker-сети. Наружу его публикует Caddy.
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: format_caddy
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
